<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Paula Pratinhos - Sabor & Delícia</title>
<style>
  :root {
    --primary-color: #D35400;
    --secondary-color: #E67E22;
    --accent-color: #F39C12;
    --background-color: #FFF8E7;
    --text-color: #5D4037;
    --header-bg: linear-gradient(135deg, #D35400, #E67E22);
    --button-hover: #A04000;
    --border-color: #DEB887;
    --shadow: 0 4px 6px rgba(0,0,0,0.1);
  }
  
  * { box-sizing: border-box; }
  
  body { 
    font-family: 'Georgia', 'Times New Roman', serif; 
    background: linear-gradient(180deg, #FFF8E7 0%, #FFE4B5 100%);
    color: var(--text-color); 
    margin: 0; 
    padding: 0; 
    line-height: 1.6;
  }
  
  header { 
    background: var(--header-bg); 
    color: white; 
    padding: 20px 15px; 
    text-align: center;
    box-shadow: var(--shadow);
    position: sticky;
    top: 0;
    z-index: 100;
  }
  
  header h1 { 
    margin: 0; 
    font-size: 1.8rem;
    text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
  }
  
  header p { 
    margin: 5px 0 0; 
    font-style: italic;
    font-size: 0.9rem;
    opacity: 0.9;
  }
  
  section { 
    padding: 25px 20px; 
    max-width: 800px; 
    margin: 20px auto;
    background: white;
    border-radius: 15px;
    box-shadow: var(--shadow);
    border: 2px solid var(--border-color);
  }
  
  section h2 { 
    color: var(--primary-color);
    text-align: center;
    margin-bottom: 25px;
    font-size: 1.5rem;
    border-bottom: 2px dashed var(--accent-color);
    padding-bottom: 10px;
  }
  
  label { 
    display: block; 
    margin: 15px 0 8px; 
    font-weight: bold;
    color: var(--text-color);
  }
  
  input, select { 
    width: 100%; 
    padding: 12px 15px; 
    margin-bottom: 15px; 
    border: 2px solid var(--border-color); 
    border-radius: 8px; 
    font-size: 1rem;
    transition: border-color 0.3s;
    background: #FFFEF7;
  }
  
  input:focus, select:focus {
    outline: none;
    border-color: var(--primary-color);
  }
  
  button { 
    background: linear-gradient(135deg, var(--primary-color), var(--secondary-color)); 
    color: white; 
    padding: 15px 20px; 
    border: none; 
    border-radius: 8px; 
    cursor: pointer; 
    width: 100%; 
    font-size: 1.1rem;
    font-weight: bold;
    transition: transform 0.2s, box-shadow 0.2s;
    box-shadow: var(--shadow);
    margin-top: 10px;
  }
  
  button:hover { 
    background: linear-gradient(135deg, var(--button-hover), var(--primary-color));
    transform: translateY(-2px);
    box-shadow: 0 6px 12px rgba(0,0,0,0.15);
  }
  
  button:active {
    transform: translateY(0);
  }
  
  .hidden { display: none; }
  
  .modal-bg { 
    background-color: rgba(0, 0, 0, 0.7); 
    position: fixed; 
    top: 0; 
    left: 0; 
    right: 0; 
    bottom: 0;
    display: flex; 
    justify-content: center; 
    align-items: center; 
    visibility: hidden;
    z-index: 1000;
    padding: 15px;
  }
  
  .modal { 
    background: white; 
    color: var(--text-color); 
    border-radius: 15px; 
    padding: 25px; 
    width: 100%; 
    max-width: 500px; 
    white-space: pre-wrap;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    border: 3px solid var(--accent-color);
    max-height: 80vh;
    overflow-y: auto;
  }
  
  .modal-bg.visible { visibility: visible; }
  
  .modal h3 {
    color: var(--primary-color);
    text-align: center;
    margin-top: 0;
  }
  
  .modal button {
    margin-top: 15px;
  }
  
  .modal button:first-of-type {
    background: linear-gradient(135deg, #27AE60, #2ECC71);
  }
  
  .modal button:last-of-type {
    background: linear-gradient(135deg, #7F8C8D, #95A5A6);
  }
  
  input[type="checkbox"] {
    width: auto;
    margin-right: 10px;
    vertical-align: middle;
  }
  
  label.checkbox-label {
    display: flex;
    align-items: center;
    padding: 10px;
    background: #FFFEF7;
    border: 1px solid var(--border-color);
    border-radius: 8px;
    margin: 8px 0;
    cursor: pointer;
    transition: background 0.3s;
  }
  
  label.checkbox-label:hover {
    background: #FFF5E6;
  }
  
  .food-icon {
    font-size: 2rem;
    display: block;
    text-align: center;
    margin: 10px 0;
  }
  
  /* Responsividade para todas as telas */
  @media (max-width: 768px) {
    header h1 { font-size: 1.5rem; }
    section { margin: 15px auto; padding: 20px 15px; }
    section h2 { font-size: 1.3rem; }
    button { font-size: 1rem; padding: 12px 15px; }
    .modal { padding: 20px; }
  }
  
  @media (max-width: 480px) {
    header { padding: 15px 10px; }
    header h1 { font-size: 1.3rem; }
    header p { font-size: 0.8rem; }
    section { margin: 10px auto; padding: 15px 12px; border-radius: 10px; }
    section h2 { font-size: 1.2rem; }
    input, select { padding: 10px 12px; font-size: 0.95rem; }
    button { font-size: 0.95rem; padding: 12px; }
    .modal { padding: 15px; max-width: 95%; }
    .food-icon { font-size: 1.5rem; }
  }
  
  @media (min-width: 769px) and (max-width: 1024px) {
    section { max-width: 700px; }
  }
  
  @media (min-width: 1025px) {
    section { max-width: 800px; }
    button { max-width: 400px; margin-left: auto; margin-right: auto; }
  }
  
  @media (orientation: landscape) and (max-height: 500px) {
    header { padding: 10px; }
    header h1 { font-size: 1.2rem; }
    section { margin: 10px auto; padding: 15px; }
    .modal { max-height: 90vh; }
  }
</style>
</head>
<body>
<header>
  <span class="food-icon">🍳👨‍🍳🍽️</span>
  <h1>Paula Pratinhos</h1>
  <p>Sabor caseiro que aquece o coração!</p>
</header>

<section id="cadastro">
  <h2>👤 Cadastro</h2>
  <label for="nome">Nome Completo</label>
  <input type="text" id="nome" required placeholder="Digite seu nome completo">
  <label for="email">E-mail 📧</label>
  <input type="email" id="email" required placeholder="seu@email.com">
  <label for="telefone">Telefone 📱</label>
  <input type="tel" id="telefone" required placeholder="(XX) XXXXX-XXXX">
  <button onclick="proximoCadastro()">Próximo ➡️</button>
</section>

<section id="pedido" class="hidden">
  <h2>🍽️ Monte seu Pedido</h2>
  <label for="tamanho">Tamanho do Pratinho</label>
  <select id="tamanho">
    <option value="P">P - R$ 15,00</option>
    <option value="M">M - R$ 18,00</option>
    <option value="G">G - R$ 22,00</option>
  </select>

  <label for="guarnicao">Guarnição (Escolha 1)</label>
  <select id="guarnicao">
    <option>Baião de Dois</option>
    <option>Arroz Branco</option>
    <option>Arroz com Cenoura e Passas</option>
  </select>

  <label>Misturas (Escolha 2) 🍗</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Vatapá de Frango" onclick="contarMisturas()"> Vatapá de Frango</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Creme de Frango" onclick="contarMisturas()"> Creme de Frango</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Calabresa Acebolada" onclick="contarMisturas()"> Calabresa Acebolada</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Fricassê de Frango" onclick="contarMisturas()"> Fricassê de Frango</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Fricassê de Carne" onclick="contarMisturas()"> Fricassê de Carne</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Strogonoff de Frango" onclick="contarMisturas()"> Strogonoff de Frango</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Strogonoff de Carne" onclick="contarMisturas()"> Strogonoff de Carne</label>
  <label class="checkbox-label"><input type="checkbox" name="mistura" value="Panqueca de Carne" onclick="contarMisturas()"> Panqueca de Carne</label>

  <label>Acompanhamentos 🥗</label>
  <select id="acompanhamento">
    <option value="Completo">Completo (Paçoca, Batata Palha e Saladas)</option>
    <option value="Paçoca">Paçoca</option>
    <option value="Batata Palha">Batata Palha</option>
    <option value="Saladas">Saladas</option>
  </select>

  <button onclick="proximoPedido()">Próximo</button>
</section>

<section id="entrega" class="hidden">
  <h2>🚚 Entrega e Pagamento</h2>
  <label for="nomeEntrega">Nome</label>
  <input type="text" id="nomeEntrega" required>
  <label for="endereco">Endereço de Entrega 🏠</label>
  <input type="text" id="endereco" required>
  <label for="telefoneEntrega">Telefone</label>
  <input type="tel" id="telefoneEntrega" required>

  <label for="pagamento">Forma de Pagamento 💳</label>
  <select id="pagamento" onchange="mostrarTroco()">
    <option value="cartao">Cartão de Crédito/Débito</option>
    <option value="pix">Pix</option>
    <option value="dinheiro">Dinheiro</option>
  </select>

  <div id="trocoDiv" class="hidden">
    <label for="troco">Troco para 💵</label>
    <input type="number" id="troco" min="0" step="0.01">
  </div>

  <button onclick="finalizarPedido()">Finalizar Pedido ✅</button>
</section>

<div id="modal" class="modal-bg">
  <div class="modal">
    <h3>📋 Resumo do Pedido</h3>
    <p id="statusPedido"></p>
    <button onclick="confirmarPedido()">Confirmar Pedido 🚀</button>
    <button onclick="voltarCardapio()">Voltar ao Cardápio 🔙</button>
  </div>
</div>

<script>
  let cadastroData = {};
  let pedidoData = {};

  function proximoCadastro() {
    const nome = document.getElementById('nome').value.trim();
    const email = document.getElementById('email').value.trim();
    const telefone = document.getElementById('telefone').value.trim();
    if (!nome || !email || !telefone) {
      alert('Por favor, preencha todos os campos do cadastro.');
      return;
    }
    cadastroData = { nome, email, telefone };
    document.getElementById('cadastro').classList.add('hidden');
    document.getElementById('pedido').classList.remove('hidden');
  }

  function contarMisturas() {
    const checkboxes = document.querySelectorAll('input[name="mistura"]:checked');
    if (checkboxes.length > 2) {
      checkboxes[checkboxes.length - 1].checked = false;
      alert('Escolha no máximo 2 misturas.');
    }
  }

  function proximoPedido() {
    const tamanho = document.getElementById('tamanho').value;
    const guarnicao = document.getElementById('guarnicao').value;
    const misturasChecked = Array.from(document.querySelectorAll('input[name="mistura"]:checked')).map(i => i.value);
    if (misturasChecked.length !== 2) {
      alert('Por favor, escolha 2 misturas.');
      return;
    }
    const acompanhamento = document.getElementById('acompanhamento').value;

    pedidoData = { tamanho, guarnicao, misturas: misturasChecked, acompanhamento };
    document.getElementById('pedido').classList.add('hidden');
    document.getElementById('entrega').classList.remove('hidden');

    document.getElementById('nomeEntrega').value = cadastroData.nome;
    document.getElementById('telefoneEntrega').value = cadastroData.telefone;
  }

  function mostrarTroco() {
    const formaPagamento = document.getElementById('pagamento').value;
    document.getElementById('trocoDiv').classList.toggle('hidden', formaPagamento !== 'dinheiro');
  }

  function gerarResumoPedido() {
    return `Pedido de Paula Pratinhos:

Nome: ${cadastroData.nome}
Telefone: ${cadastroData.telefone}

Tamanho do Pratinho: ${pedidoData.tamanho}
Guarnição: ${pedidoData.guarnicao}
Misturas: ${pedidoData.misturas.join(', ')}
Acompanhamento: ${pedidoData.acompanhamento}

Endereço de Entrega: ${document.getElementById('endereco').value}
Forma de Pagamento: ${document.getElementById('pagamento').value === 'dinheiro' ? 'Dinheiro' : document.getElementById('pagamento').value.toUpperCase()}
Troco para: ${document.getElementById('pagamento').value === 'dinheiro' ? document.getElementById('troco').value || 'N/A' : 'N/A'}`;
  }

  function finalizarPedido() {
    const nomeEntrega = document.getElementById('nomeEntrega').value.trim();
    const endereco = document.getElementById('endereco').value.trim();
    const telefoneEntrega = document.getElementById('telefoneEntrega').value.trim();
    if (!nomeEntrega || !endereco || !telefoneEntrega) {
      alert('Por favor, preencha todos os campos de entrega.');
      return;
    }
    const resumo = gerarResumoPedido();
    document.getElementById('statusPedido').textContent = resumo;
    document.getElementById('modal').classList.add('visible');
  }

  function confirmarPedido() {
    const resumo = gerarResumoPedido();
    const phone = '5585992121215';
    const urlWhatsApp = `https://wa.me/${phone}?text=${encodeURIComponent(resumo)}`;
    window.open(urlWhatsApp, '_blank');
    alert('Pedido enviado com sucesso!');
    document.getElementById('modal').classList.remove('visible');
    document.getElementById('entrega').classList.add('hidden');
    document.getElementById('pedido').classList.remove('hidden');
  }

  function voltarCardapio() {
    document.getElementById('modal').classList.remove('visible');
  }
</script>
</body>
</html>
